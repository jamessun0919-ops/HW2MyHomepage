<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-project_management" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background Gradient -->
  <rect width="400" height="400" fill="url(#grad-project_management)" />
  
  <!-- Subtle Decorative Geometric Patterns -->
  <circle cx="350" cy="50" r="120" fill="#ffffff" opacity="0.06" />
  <rect x="-50" y="250" width="200" height="200" rx="30" transform="rotate(45 50 350)" fill="#ffffff" opacity="0.04" />
  <circle cx="200" cy="200" r="150" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1" />
  <circle cx="200" cy="200" r="100" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="8 6" opacity="0.15" />
  
  <!-- Centered Icon Container -->
  <g transform="translate(160, 160) scale(2.5)" filter="url(#shadow)">
    <rect x="4" y="4" width="16" height="4" rx="1" fill="#ffffff" /><rect x="4" y="10" width="10" height="4" rx="1" fill="#ffffff" /><rect x="4" y="16" width="13" height="4" rx="1" fill="#ffffff" />
  </g>
</svg>