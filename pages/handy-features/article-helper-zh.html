<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章小幫手 - 功能小幫手 | James Sun</title>

    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <header :class="{ 'scrolled': scrolled }">
            <nav>
                <a href="../../index-zh.html" class="logo">JAMES <span>SUN</span></a>
                <ul class="nav-links" :class="{ 'active': menuActive }">
                    <li><a href="../../index-zh.html">首頁</a></li>
                    <li><a href="../../index-zh.html#portfolio">作品集</a></li>
                    <li><a href="../../index-zh.html#contact">聯絡我</a></li>
                    <li class="language-selector">
                        <select v-model="selectedLanguage" @change="changeLanguage">
                            <option value="en">EN</option>
                            <option value="zh">中文</option>
                        </select>
                    </li>
                </ul>
                <div class="menu-toggle" @click="toggleMenu">
                    <i :class="menuActive ? 'fas fa-times' : 'fas fa-bars'"></i>
                </div>
            </nav>
        </header>

        <main class="projects-page">
            <a href="handy-features-zh.html" class="back-link">
                <i class="fas fa-arrow-left"></i> 返回功能小幫手
            </a>

            <div class="section-header">
                <h2>文章小幫手</h2>
            </div>

            <div class="action-buttons">
                <a href="https://newsnovelcrawer.onrender.com/" target="_blank" class="action-btn demo-btn">
                    <i class="fas fa-external-link-alt"></i> 點擊開始
                </a>
                <a href="https://github.com/jamessun0919-ops/NewsNovelCrawer" target="_blank" class="action-btn repo-btn">
                    <i class="fab fa-github"></i> 程式碼倉庫
                </a>
            </div>

            <div class="project-description">
                <p>網路爬蟲課程練習。用於爬取網站文章內文，跳過煩人廣告。自用功能未公開發布。</p>
                <p>練習網路爬蟲功能、解析目標網站防禦機制、繞過防禦機制的爬蟲練習。</p>
            </div>
        </main>

        <footer>
            <p>&copy; {{ currentYear }} James Sun. 版權所有。</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://github.com/jamessun0919-ops" target="_blank"><i class="fab fa-github"></i></a>
            </div>
        </footer>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    scrolled: false,
                    menuActive: false,
                    selectedLanguage: 'zh',
                    currentYear: new Date().getFullYear()
                }
            },
            methods: {
                handleScroll() {
                    this.scrolled = window.scrollY > 50;
                },
                toggleMenu() {
                    this.menuActive = !this.menuActive;
                },
                changeLanguage() {
                    if (this.selectedLanguage === 'en') {
                        window.location.href = 'article-helper.html';
                    }
                }
            },
            mounted() {
                window.addEventListener('scroll', this.handleScroll);
            },
            unmounted() {
                window.removeEventListener('scroll', this.handleScroll);
            }
        }).mount('#app');
    </script>
</body>
</html>
