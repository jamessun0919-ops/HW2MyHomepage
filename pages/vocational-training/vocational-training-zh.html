<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人工智慧與資料分析 - 2026職訓課程 | James Sun</title>

    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <header :class="{ 'scrolled': scrolled }">
            <nav>
                <a href="../../index-zh.html" class="logo">JAMES <span>SUN</span></a>
                <ul class="nav-links" :class="{ 'active': menuActive }">
                    <li><a href="../../index-zh.html">首頁</a></li>
                    <li><a href="../../index-zh.html#portfolio">作品集</a></li>
                    <li><a href="../../index-zh.html#contact">聯絡我</a></li>
                    <li class="language-selector">
                        <select v-model="selectedLanguage" @change="changeLanguage">
                            <option value="en">EN</option>
                            <option value="zh">中文</option>
                        </select>
                    </li>
                </ul>
                <div class="menu-toggle" @click="toggleMenu">
                    <i :class="menuActive ? 'fas fa-times' : 'fas fa-bars'"></i>
                </div>
            </nav>
        </header>

        <main class="projects-page">
            <a href="../../index-zh.html#portfolio" class="back-link">
                <i class="fas fa-arrow-left"></i> 返回作品集
            </a>

            <div class="section-header">
                <h2>人工智慧與資料分析</h2>
                <p>2026職訓課程</p>
            </div>

            <div class="gallery-grid static-gallery">
                <a href="group-project-zh.html" class="gallery-item">
                    <img src="../../img/FinalProject.jpg" alt="職訓課程小組專題">
                    <div class="gallery-info">
                        <h3>職訓課程小組專題</h3>
                        <p></p>
                    </div>
                </a>
                <a href="ai-projects-zh.html" class="gallery-item">
                    <img src="../../img/AIwork.png" alt="機器學習演算法學習紀錄">
                    <div class="gallery-info">
                        <h3>機器學習演算法
學習紀錄
                            <span class="gallery-subtitle">陳煥老師指導</span>
                        </h3>
                        <p></p>
                    </div>
                </a>
                <a href="prog-projects-zh.html" class="gallery-item">
                    <img src="../../img/PythonWork.jpg" alt="程式語言課程實作">
                    <div class="gallery-info">
                        <h3>程式語言課程實作
                            <span class="gallery-subtitle">蔡正一老師指導</span>
                        </h3>
                        <p></p>
                    </div>
                </a>
            </div>
        </main>

        <footer>
            <p>&copy; {{ currentYear }} James Sun. 版權所有。</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://github.com/jamessun0919-ops" target="_blank"><i class="fab fa-github"></i></a>
            </div>
        </footer>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    scrolled: false,
                    menuActive: false,
                    selectedLanguage: 'zh',
                    currentYear: new Date().getFullYear()
                }
            },
            methods: {
                handleScroll() {
                    this.scrolled = window.scrollY > 50;
                },
                toggleMenu() {
                    this.menuActive = !this.menuActive;
                },
                changeLanguage() {
                    if (this.selectedLanguage === 'en') {
                        window.location.href = 'vocational-training.html';
                    }
                }
            },
            mounted() {
                window.addEventListener('scroll', this.handleScroll);
            },
            unmounted() {
                window.removeEventListener('scroll', this.handleScroll);
            }
        }).mount('#app');
    </script>
</body>
</html>
